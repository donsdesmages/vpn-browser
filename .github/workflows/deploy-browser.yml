name: Deploy VPN Browser

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: donsdesmages/vpn-browser

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}

      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            docker login ghcr.io -u donsdesmages -p ${{ secrets.GITHUB_TOKEN }}
            docker pull ghcr.io/${{ env.IMAGE_NAME }}:latest
            docker rm -f vpn-browser || true
            docker run -d \
              --name vpn-browser \
              --network vpn-network \
              -p 8081:3000 \
              --restart unless-stopped \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e NEXTAUTH_SECRET="${{ secrets.NEXTAUTH_SECRET }}" \
              -e NEXTAUTH_URL="http://77.110.125.22:8081" \
              -e KEY_GENERATOR_URL="http://key-generator:8080" \
              -e YUKASSA_SHOP_ID="${{ secrets.YUKASSA_SHOP_ID }}" \
              -e YUKASSA_SECRET_KEY="${{ secrets.YUKASSA_SECRET_KEY }}" \
              ghcr.io/${{ env.IMAGE_NAME }}:latest
            docker ps | grep vpn-browser
